<!DOCTYPE html> <!--  declaração para informar ao navegador qual é a versão do HTML utilizada no arquivo -->
<html lang="en"> <!-- ajuda a definir o idioma de um elemento: a língua em que elementos não-editáveis são escritos, ou a língua em que elementos editáveis devem ser escritos pelo usuário -->
<style> 
    table, th, td {
  border:20px solid rgba(253, 192, 80, 0.932);
}
</style>
<head> <!--  providencia informações gerais (metadados - dados sobre o documento) sobre o documento, incluindo seu título e links para scripts e folhas de estilos -->
    <meta charset="UTF-8"> <!-- utilizado para fazer a indicação de um formato de codificação definido por caracteres que foram utilizados em um determinado documento -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- serve para tornar sites responsivos, ajustando a largura da página à tela do dispositivo (celular, tablet ou PC) e definindo o zoom inicial como 100% -->
    <title> Bolos e Cia </title> <!-- título do seu documento -->
</head> <!-- fechar o head -->
<body> <!-- corpo do texto - tudo que é visível na tela -->
    <div class="card"> <!-- container; serve para armazenar elementos --> 
        <img src="https://cdn.shoppub.io/cdn-cgi/image/w=1000,h=1000,q=80,f=auto/beirario/media/uploads/produtos/foto/kidtfesb/file.jpg" alt="texto alternativo que uma pessoa que não vê, ouvir ou ler" width="700px" height="600px"> <!-- imagem-->
        <h1> Bolo de Chocolate com Cobertura e Recheio de Chocolate</h1> <!-- título -->
        <p> Ingredientes </p> <!-- paragrafo 1-->
        <p> Modo de Preparo</p> <!-- paragrafo 2 -->

    </div> <!-- fecha a tag -->
</body> <!-- fechar o corpo -->
</html> <!-- fechar o html -->
</DOCTYPE> <!-- fechar a tag-->
